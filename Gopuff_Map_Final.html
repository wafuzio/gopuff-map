<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gopuff MFC & Delivery Coverage Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #f5f5f5; }
  #map { height: calc(100vh - 60px); width: 100%; touch-action: manipulation; }
  .header { background: white; color: #333; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; min-height: 60px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .header h1 { font-size: 18px; font-weight: 600; color: #333; }
  .header .stats { font-size: 13px; opacity: 0.7; color: #666; }
  .export-btn { background: #e0e0e0; color: rgb(0, 164, 255); border: none; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .export-btn:hover { background: #d0d0d0; }
  .filters { position: absolute; top: 70px; left: 10px; background: white; padding: 20px 24px; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.15); z-index: 1000; font-size: 15px; max-width: 320px; max-height: calc(100vh - 120px); overflow-y: auto; }
  .filters h3 { margin: 0 0 14px 0; font-size: 18px; color: #333; border-bottom: 2px solid #eee; padding-bottom: 8px; font-weight: 700; }
  .filter-section { margin-bottom: 20px; }
  .filter-section:last-child { margin-bottom: 0; }
  .filter-section h4 { margin: 0 0 10px 0; font-size: 15px; color: #555; font-weight: 600; }
  .filter-item { display: flex; align-items: center; margin: 8px 0; cursor: pointer; padding: 6px 8px; border-radius: 6px; transition: background 0.15s; }
  .filter-item:hover { background: #f5f5f5; }
  .filter-item.disabled { opacity: 0.3; }
  .filter-item.active { background: #e0f5f3; border-left: 4px solid #00B4A6; }
  .filter-label { color: #333; font-weight: 500; flex: 1; font-size: 14px; }
  .filter-count { margin-left: auto; padding-left: 10px; color: #888; font-size: 13px; font-weight: 600; }
  .legend { position: absolute; bottom: 30px; right: 10px; background: white; padding: 20px 24px; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.15); z-index: 1000; font-size: 15px; min-width: 240px; max-width: 320px; }
  .zoom-display { position: absolute; bottom: 10px; left: 10px; background: white; padding: 8px 16px; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); z-index: 1000; font-size: 14px; font-weight: 600; color: #333; }
  .legend h3 { margin: 0 0 14px 0; font-size: 18px; color: #333; border-bottom: 2px solid #eee; padding-bottom: 8px; font-weight: 700; }
  .legend-key { display: flex; align-items: center; margin: 12px 0; }
  .legend-key-label { font-size: 14px; color: #666; margin-left: 12px; font-weight: 500; }
  .legend-color-box { width: 28px; height: 28px; border-radius: 4px; border: 1px solid #ccc; }
  .popup-content { font-size: 13px; line-height: 1.6; min-width: 200px; }
  .popup-content .mfc-name { font-weight: 700; font-size: 15px; color: #00B4A6; }
  .popup-content .zip-code { font-weight: 700; font-size: 14px; color: #00B4A6; }
  .mfc-marker { background: #00B4A6; color: white; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; box-shadow: 0 2px 8px rgba(0,180,166,0.4); border: 3px solid white; }
  .leaflet-control-attribution { background: rgba(255,255,255,0.6) !important; font-size: 10px; }
  .layer-toggle { position: absolute; top: 70px; right: 10px; background: white; padding: 10px 14px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); z-index: 1000; font-size: 12px; }
  .layer-toggle label { display: flex; align-items: center; margin: 6px 0; cursor: pointer; }
  .layer-toggle input { margin-right: 8px; }
  .loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px 40px; border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,0.2); z-index: 2000; font-size: 14px; color: #333; text-align: center; }
  .loading-progress { margin-top: 10px; font-size: 12px; color: #666; }
  .search-container { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); z-index: 1000; width: auto; }
  .search-box { display: flex; gap: 8px; background: white; padding: 10px; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.15); }
  .search-input { flex: 1; min-width: 600px; padding: 10px 14px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 14px; outline: none; transition: border-color 0.2s; position: relative; }
  .search-input:focus { border-color: #00B4A6; }
  .autocomplete-dropdown { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 2px solid #00B4A6; border-top: none; border-radius: 0 0 6px 6px; max-height: 200px; overflow-y: auto; z-index: 1001; display: none; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
  .autocomplete-item { padding: 10px 14px; cursor: pointer; font-size: 13px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; gap: 8px; }
  .autocomplete-item:hover { background: #f5f5f5; }
  .autocomplete-item:focus { background: #e0f5f3; }
  .autocomplete-item:last-child { border-bottom: none; }
  .coverage-dot { width: 8px; height: 8px; border-radius: 50%; background: #00B4A6; flex-shrink: 0; }
  .search-btn { background: rgb(0, 164, 255); color: white; border: none; padding: 10px 20px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .search-btn:hover { background: rgb(0, 140, 220); }
  .search-result { margin-top: 8px; padding: 12px 14px; background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); font-size: 13px; display: none; }
  .search-result.covered { border-left: 4px solid #4CAF50; color: #2E7D32; }
  .search-result.not-covered { border-left: 4px solid #F44336; color: #C62828; }
  .search-result.searching { border-left: 4px solid #FF9800; color: #E65100; }
  .search-marker { background: #FF5722; color: white; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 700; box-shadow: 0 3px 12px rgba(255,87,34,0.5); border: 3px solid white; }
  
  /* Mobile Responsive Styles */
  @media (max-width: 768px) {
    .header { padding: 8px 12px; height: auto; flex-direction: column; gap: 8px; align-items: flex-start; }
    .header h1 { font-size: 16px; }
    .header .stats { font-size: 11px; }
    .export-btn { padding: 6px 12px; font-size: 12px; }
    
    .search-container { top: 120px; width: 95%; max-width: none; }
    .search-box { flex-direction: column; padding: 8px; }
    .search-input { min-width: auto; width: 100%; font-size: 13px; padding: 8px 12px; }
    .search-btn { width: 100%; padding: 10px; }
    .search-result { font-size: 12px; padding: 10px 12px; }
    
    .filters { top: 10px; left: 10px; max-width: 200px; padding: 10px 12px; font-size: 12px; max-height: 50vh; }
    .filters h3 { font-size: 13px; margin-bottom: 8px; padding-bottom: 4px; }
    .filter-section { margin-bottom: 12px; }
    .filter-section h4 { font-size: 12px; margin-bottom: 6px; }
    .filter-label { font-size: 11px; }
    .filter-count { font-size: 10px; }
    .filter-item { margin: 4px 0; padding: 4px 6px; }
    
    .legend { bottom: 10px; right: 10px; padding: 10px 12px; font-size: 12px; min-width: 140px; max-width: 180px; }
    .legend h3 { font-size: 13px; margin-bottom: 8px; padding-bottom: 4px; }
    .legend-key { margin: 6px 0; }
    .legend-key-label { font-size: 11px; margin-left: 8px; }
    .legend-color-box { width: 18px; height: 18px; }
    
    .layer-toggle { top: 10px; right: 10px; padding: 6px 10px; font-size: 10px; }
    .layer-toggle label { margin: 4px 0; }
    .zoom-display { bottom: 6px; left: 6px; padding: 4px 10px; font-size: 11px; }
    
    .autocomplete-item { padding: 8px 12px; font-size: 12px; }
    .coverage-dot { width: 6px; height: 6px; }
  }
  
  @media (max-width: 480px) {
    .header h1 { font-size: 14px; }
    .header .stats { font-size: 10px; }
    
    .search-container { top: 110px; }
    .search-input { font-size: 12px; }
    
    .filters { max-width: 180px; padding: 8px 10px; font-size: 11px; max-height: 45vh; }
    .filters h3 { font-size: 12px; margin-bottom: 6px; }
    .filter-section { margin-bottom: 10px; }
    .filter-section h4 { font-size: 11px; margin-bottom: 4px; }
    .filter-label { font-size: 10px; }
    .filter-count { font-size: 9px; }
    .filter-item { margin: 3px 0; padding: 3px 5px; }
    
    .legend { padding: 8px 10px; font-size: 11px; min-width: 120px; max-width: 150px; }
    .legend h3 { font-size: 12px; margin-bottom: 6px; }
    .legend-key { margin: 5px 0; }
    .legend-key-label { font-size: 10px; margin-left: 6px; }
    .legend-color-box { width: 16px; height: 16px; }
    
    .layer-toggle { padding: 5px 8px; font-size: 9px; }
    .zoom-display { padding: 3px 8px; font-size: 10px; }
  }
</style>
</head>
<body>
<div class="header">
  <div style="display: flex; align-items: center; gap: 12px;">
    <img src="Gopufflogo.png" alt="Gopuff" style="height: 32px;">
    <div>
      <h1>DC & Delivery Coverage Map</h1>
      <div class="stats" id="statsBar">Loading data...</div>
    </div>
  </div>
  <button class="export-btn" onclick="exportData()">Export Data</button>
</div>
<div class="search-container">
  <div class="search-box">
    <div style="flex: 1; position: relative;">
      <input type="text" class="search-input" id="searchInput" placeholder="Search by address, zip code, or city/state..." onkeydown="handleKeyDown(event)" oninput="handleSearchInput()" onfocus="handleSearchInput()" onblur="setTimeout(() => hideAutocomplete(), 200)">
      <div class="autocomplete-dropdown" id="autocompleteDropdown"></div>
    </div>
    <button class="search-btn" onclick="handleSearchClick()">Search</button>
  </div>
  <div class="search-result" id="searchResult"></div>
</div>
<div id="map"></div>
<div class="filters" id="filters"></div>
<div class="legend" id="legend"></div>
<div class="zoom-display" id="zoomDisplay">Zoom: 5</div>
<div class="layer-toggle">
  <label><input type="checkbox" id="toggleDelivery" checked onchange="toggleLayer('delivery')"> Delivery Zip Codes</label>
</div>
<div class="loading" id="loading">
  Loading map data...
  <div class="loading-progress" id="loadingProgress"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
let DC_LOCATIONS = [];
let DELIVERY_ZIPS = [];
let ZIP_BOUNDARIES = null;
let map, deliveryLayer, searchMarker;
let filters = { states:{}, metros:{} };
let activeFilters = { states: new Set(), metros: new Set() };
let dcZipCodes = new Set();
let deliveryZipSet = new Set();
let cityToZipsMap = {};
let autocompleteTimeout = null;
let selectedAutocompleteIndex = -1;
let autocompleteResults = [];

function popupHtmlZip(zipCode, zipData, hasDC, dcInfo) {
  let html = `<div class="popup-content">
    <div class="zip-code">Zip Code: ${zipCode}</div>`;
  if (hasDC && dcInfo) {
    html += `<div style="color:#00A4FF;font-weight:600;">📦 DC: ${dcInfo.name}</div>`;
    if (dcInfo.region) html += `<div>Region: ${dcInfo.region}</div>`;
  }
  if (zipData.city) html += `<div>City: ${zipData.city}</div>`;
  if (zipData.state) html += `<div>State: ${zipData.state}</div>`;
  if (zipData.metro) html += `<div>Metro: ${zipData.metro}</div>`;
  html += `</div>`;
  return html;
}

async function loadData() {
  try {
    document.getElementById('loadingProgress').textContent = 'Loading DC locations...';
    const dcResponse = await fetch('gopuff_dc_enhanced.json');
    DC_LOCATIONS = await dcResponse.json();
    
    // Build set of zip codes that have DCs
    DC_LOCATIONS.forEach(dc => {
      if (dc.zip) dcZipCodes.add(dc.zip);
    });
    
    document.getElementById('loadingProgress').textContent = 'Loading delivery zip codes...';
    const deliveryResponse = await fetch('gopuff_delivery_data.json');
    DELIVERY_ZIPS = await deliveryResponse.json();
    
    // Build set of all delivery zip codes and city-to-zips mapping
    DELIVERY_ZIPS.forEach(d => {
      if (d.zip) deliveryZipSet.add(d.zip);
      if (d.city && d.state) {
        const cityKey = `${d.city}, ${d.state}`.toLowerCase();
        if (!cityToZipsMap[cityKey]) {
          cityToZipsMap[cityKey] = { zips: new Set(), city: d.city, state: d.state };
        }
        cityToZipsMap[cityKey].zips.add(d.zip);
      }
    });
    
    document.getElementById('loadingProgress').textContent = 'Loading zip code boundaries (62 MB)...';
    const boundariesResponse = await fetch('https://raw.githubusercontent.com/wafuzio/gopuff-map/main/gopuff_delivery_zip_boundaries.json');
    ZIP_BOUNDARIES = await boundariesResponse.json();
    
    document.getElementById('loading').style.display = 'none';
    initializeMap();
  } catch (error) {
    console.error('Error loading data:', error);
    document.getElementById('loading').innerHTML = 'Error loading data. Please refresh the page.<br><small>' + error.message + '</small>';
  }
}

function initializeMap() {
  map = L.map('map', {zoomControl:true, attributionControl:true, minZoom:4, maxZoom:16}).setView([39,-97],5);

  // Add base tile layer
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19
  }).addTo(map);

  // Add label layer
  const labelLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://carto.com/attributions">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 20,
    minZoom: 6
  }).addTo(map);

  map.on('zoomend', function() {
    const currentZoom = map.getZoom();
    document.getElementById('zoomDisplay').textContent = 'Zoom: ' + currentZoom;
  });

  window.exportData = function() {
    let csv = 'Type,Name,Address,Zip Code,City,Region,State,Metro,Latitude,Longitude\n';
    DC_LOCATIONS.forEach(dc => {
      csv += `"DC","${dc.name}","${dc.address || ''}","${dc.zip}","${dc.city || ''}","${dc.region || ''}","","",${dc.lat},${dc.lon}\n`;
    });
    DELIVERY_ZIPS.forEach(d => {
      csv += `"Delivery Zip","","","${d.zip}","${d.city}","","${d.state}","${d.metro || ''}","",""\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    const url = URL.createObjectURL(blob);
    link.setAttribute('href', url);
    link.setAttribute('download', 'gopuff_coverage_export.csv');
    link.style.visibility = 'hidden';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  };

  // Add delivery zip code polygons
  deliveryLayer = L.layerGroup();
  
  // Create a lookup map for zip data and DC data
  const zipDataMap = {};
  DELIVERY_ZIPS.forEach(d => {
    zipDataMap[d.zip] = d;
  });
  
  const dcDataMap = {};
  DC_LOCATIONS.forEach(dc => {
    if (dc.zip) dcDataMap[dc.zip] = dc;
  });
  
  // Add zip code boundaries as polygons
  if (ZIP_BOUNDARIES && ZIP_BOUNDARIES.features) {
    ZIP_BOUNDARIES.features.forEach(feature => {
      const zipCode = feature.properties.ZCTA5CE10 || feature.properties.GEOID10;
      const zipData = zipDataMap[zipCode] || {};
      const hasDC = dcZipCodes.has(zipCode);
      const dcInfo = dcDataMap[zipCode];
      
      const polygon = L.geoJSON(feature, {
        style: {
          fillColor: hasDC ? 'rgb(0, 164, 255)' : 'rgb(180, 160, 230)',
          fillOpacity: 0.25,
          color: hasDC ? 'rgb(0, 200, 255)' : 'rgb(150, 120, 210)',
          weight: hasDC ? 2 : 1
        },
        onEachFeature: function(feature, layer) {
          layer.bindPopup(popupHtmlZip(zipCode, zipData, hasDC, dcInfo));
        }
      });
      
      deliveryLayer.addLayer(polygon);
    });
  }
  
  deliveryLayer.addTo(map);

  // Initialize filters
  DELIVERY_ZIPS.forEach(d => {
    filters.states[d.state] = true;
    if (d.metro) filters.metros[d.metro] = true;
  });

  buildFilters();
  buildLegend();
  updateTitle();
}

window.toggleLayer = function(type) {
  if (type === 'delivery') {
    if (document.getElementById('toggleDelivery').checked) {
      map.addLayer(deliveryLayer);
    } else {
      map.removeLayer(deliveryLayer);
    }
  }
};

function buildFilters() {
  let h = '<h3>Filters</h3>';
  
  // States filter
  h += '<div class="filter-section"><h4>States</h4>';
  const states = Object.keys(filters.states).sort();
  const showAllStates = window.showAllStates || false;
  const displayStates = showAllStates ? states : states.slice(0, 10);
  
  displayStates.forEach(s => {
    const count = DELIVERY_ZIPS.filter(d => d.state === s).length;
    const isActive = activeFilters.states.has(s);
    const cls = isActive ? 'active' : '';
    h += `<div class="filter-item ${cls}" onclick="toggleFilter('states','${s}')">
      <span class="filter-label">${s}</span>
      <span class="filter-count">${count} zips</span>
    </div>`;
  });
  if (!showAllStates && states.length > 10) {
    h += `<div style="font-size:10px;color:#00B4A6;margin-top:4px;cursor:pointer;font-weight:600;" onclick="expandStates()">+${states.length - 10} more states</div>`;
  }
  h += '</div>';
  
  document.getElementById('filters').innerHTML = h;
}

window.expandStates = function() {
  window.showAllStates = true;
  buildFilters();
};

function buildLegend() {
  let h = '<h3>Legend</h3>';
  h += '<div class="legend-key">';
  h += '<div class="legend-color-box" style="background:rgb(0, 164, 255);opacity:0.25;border:1px solid rgb(0, 164, 255);"></div>';
  h += '<span class="legend-key-label">Zip Code with DC</span>';
  h += '</div>';
  h += '<div class="legend-key">';
  h += '<div class="legend-color-box" style="background:rgb(180, 160, 230);opacity:0.25;border:1px solid rgb(150, 120, 210);"></div>';
  h += '<span class="legend-key-label">Delivery Zip Code</span>';
  h += '</div>';
  document.getElementById('legend').innerHTML = h;
}

function updateTitle() {
  const visibleZipCount = deliveryLayer.getLayers().length;
  const totalZipCount = ZIP_BOUNDARIES ? ZIP_BOUNDARIES.features.length : DELIVERY_ZIPS.length;
  const totalDcCount = DC_LOCATIONS.length;
  
  if (activeFilters.states.size > 0) {
    document.getElementById('statsBar').textContent = `${visibleZipCount} of ${totalZipCount} Delivery Zip Codes · ${totalDcCount} DCs`;
  } else {
    document.getElementById('statsBar').textContent = `${totalZipCount} Delivery Zip Codes · ${totalDcCount} DCs`;
  }
}

function toggleFilter(cat, val) {
  // Toggle the filter in activeFilters set
  if (activeFilters[cat].has(val)) {
    activeFilters[cat].delete(val);
  } else {
    activeFilters[cat].add(val);
  }
  
  buildFilters();
  updateMapFilters();
  
  // Zoom to selected states
  if (cat === 'states' && activeFilters.states.size > 0) {
    zoomToSelectedStates();
  }
}

function updateMapFilters() {
  // Clear current layers
  deliveryLayer.clearLayers();
  
  // Create zip data lookup and DC data lookup
  const zipDataMap = {};
  DELIVERY_ZIPS.forEach(d => {
    zipDataMap[d.zip] = d;
  });
  
  const dcDataMap = {};
  DC_LOCATIONS.forEach(dc => {
    if (dc.zip) dcDataMap[dc.zip] = dc;
  });
  
  // Filter delivery zip codes
  const hasStateFilter = activeFilters.states.size > 0;
  
  if (ZIP_BOUNDARIES && ZIP_BOUNDARIES.features) {
    ZIP_BOUNDARIES.features.forEach(feature => {
      const zipCode = feature.properties.ZCTA5CE10 || feature.properties.GEOID10;
      const zipData = zipDataMap[zipCode] || {};
      const hasDC = dcZipCodes.has(zipCode);
      const dcInfo = dcDataMap[zipCode];
      
      // Check if zip passes filters
      let show = true;
      if (hasStateFilter && !activeFilters.states.has(zipData.state)) {
        show = false;
      }
      
      if (show) {
        const polygon = L.geoJSON(feature, {
          style: {
            fillColor: hasDC ? 'rgb(0, 164, 255)' : 'rgb(180, 160, 230)',
            fillOpacity: 0.25,
            color: hasDC ? 'rgb(0, 200, 255)' : 'rgb(150, 120, 210)',
            weight: hasDC ? 2 : 1
          },
          onEachFeature: function(feature, layer) {
            layer.bindPopup(popupHtmlZip(zipCode, zipData, hasDC, dcInfo));
          }
        });
        deliveryLayer.addLayer(polygon);
      }
    });
  }
  
  updateTitle();
}

function zoomToSelectedStates() {
  if (activeFilters.states.size === 0) return;
  
  // Wait a moment for deliveryLayer to be populated after filter update
  setTimeout(() => {
    const layers = deliveryLayer.getLayers();
    if (layers.length > 0) {
      const group = L.featureGroup(layers);
      map.fitBounds(group.getBounds(), {padding: [50, 50], animate: true, duration: 0.5});
    }
  }, 100);
}

async function handleSearchInput() {
  const query = document.getElementById('searchInput').value.trim();
  const dropdown = document.getElementById('autocompleteDropdown');
  
  if (autocompleteTimeout) clearTimeout(autocompleteTimeout);
  
  if (query.length < 2) {
    dropdown.style.display = 'none';
    return;
  }
  
  autocompleteTimeout = setTimeout(async () => {
    const suggestions = [];
    const queryLower = query.toLowerCase();
    
    // Add delivery city suggestions (cities with coverage)
    Object.keys(cityToZipsMap).forEach(cityKey => {
      if (cityKey.includes(queryLower)) {
        const cityData = cityToZipsMap[cityKey];
        suggestions.push({
          text: `${cityData.city}, ${cityData.state}`,
          type: 'city',
          priority: 1
        });
      }
    });
    
    // Add zip code suggestions only if query looks like a zip code
    if (/^\d+$/.test(query) && query.length <= 5) {
      DELIVERY_ZIPS.forEach(d => {
        if (d.zip && d.zip.startsWith(query)) {
          suggestions.push({
            text: `${d.zip} - ${d.city}, ${d.state}`,
            type: 'zip',
            priority: 1
          });
        }
      });
    }
    
    // If not a zip code and we have few results, add general geocoding suggestions
    if (!/^\d+$/.test(query) && suggestions.length < 5) {
      try {
        const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5&countrycodes=us&addressdetails=1`);
        const data = await response.json();
        
        data.forEach(result => {
          const addr = result.address || {};
          const city = addr.city || addr.town || addr.village || addr.municipality;
          const state = addr.state;
          
          if (city && state) {
            const displayText = `${city}, ${state}`;
            // Only add if not already in suggestions
            if (!suggestions.find(s => s.text === displayText)) {
              suggestions.push({
                text: displayText,
                type: 'geocode',
                priority: 2
              });
            }
          }
        });
      } catch (error) {
        console.log('Geocoding autocomplete error:', error);
      }
    }
    
    // Sort by priority (delivery cities first) and show suggestions
    if (suggestions.length > 0) {
      suggestions.sort((a, b) => a.priority - b.priority);
      const uniqueSuggestions = [...new Map(suggestions.map(s => [s.text, s])).values()];
      autocompleteResults = uniqueSuggestions.slice(0, 8);
      selectedAutocompleteIndex = -1;
      
      dropdown.innerHTML = autocompleteResults.map((s, idx) => {
        const escapedText = s.text.replace(/'/g, "&#39;");
        const hasCoverage = s.priority === 1; // Priority 1 means it's a delivery city
        const dot = hasCoverage ? '<span class="coverage-dot"></span>' : '<span style="width:8px;"></span>';
        return `<div class="autocomplete-item" data-index="${idx}" onclick="selectAutocomplete('${escapedText}')">${dot}<span>${s.text}</span></div>`;
      }).join('');
      dropdown.style.display = 'block';
    } else {
      dropdown.style.display = 'none';
      autocompleteResults = [];
      selectedAutocompleteIndex = -1;
    }
  }, 300);
}

function hideAutocomplete() {
  document.getElementById('autocompleteDropdown').style.display = 'none';
  selectedAutocompleteIndex = -1;
  autocompleteResults = [];
}

function handleKeyDown(event) {
  const dropdown = document.getElementById('autocompleteDropdown');
  const isDropdownVisible = dropdown.style.display === 'block';
  
  if (event.key === 'ArrowDown') {
    event.preventDefault();
    if (isDropdownVisible && autocompleteResults.length > 0) {
      selectedAutocompleteIndex = Math.min(selectedAutocompleteIndex + 1, autocompleteResults.length - 1);
      updateAutocompleteSelection();
    }
  } else if (event.key === 'ArrowUp') {
    event.preventDefault();
    if (isDropdownVisible && autocompleteResults.length > 0) {
      selectedAutocompleteIndex = Math.max(selectedAutocompleteIndex - 1, -1);
      updateAutocompleteSelection();
    }
  } else if (event.key === 'Enter') {
    event.preventDefault();
    if (isDropdownVisible && autocompleteResults.length > 0) {
      // If only one result or one is selected, use it
      if (autocompleteResults.length === 1) {
        selectAutocomplete(autocompleteResults[0].text);
      } else if (selectedAutocompleteIndex >= 0) {
        selectAutocomplete(autocompleteResults[selectedAutocompleteIndex].text);
      } else {
        searchLocation();
      }
    } else {
      searchLocation();
    }
  } else if (event.key === 'Escape') {
    hideAutocomplete();
  }
}

function updateAutocompleteSelection() {
  const items = document.querySelectorAll('.autocomplete-item');
  items.forEach((item, idx) => {
    if (idx === selectedAutocompleteIndex) {
      item.style.background = '#e0f5f3';
      item.scrollIntoView({ block: 'nearest' });
    } else {
      item.style.background = '';
    }
  });
}

function selectAutocomplete(text) {
  // Decode HTML entities
  const textarea = document.createElement('textarea');
  textarea.innerHTML = text;
  const decodedText = textarea.value;
  
  document.getElementById('searchInput').value = decodedText;
  hideAutocomplete();
  searchLocation();
}

window.handleSearchInput = handleSearchInput;
window.selectAutocomplete = selectAutocomplete;
window.hideAutocomplete = hideAutocomplete;
window.handleKeyDown = handleKeyDown;

function isPointInPolygon(point, polygon) {
  // Ray casting algorithm to check if point is inside polygon
  const x = point[0], y = point[1];
  let inside = false;
  
  for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
    const xi = polygon[i][0], yi = polygon[i][1];
    const xj = polygon[j][0], yj = polygon[j][1];
    
    const intersect = ((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
    if (intersect) inside = !inside;
  }
  
  return inside;
}

function checkPointInDeliveryArea(lat, lon) {
  // Check if the point falls within any delivery zip polygon
  if (!ZIP_BOUNDARIES || !ZIP_BOUNDARIES.features) return null;
  
  for (const feature of ZIP_BOUNDARIES.features) {
    const zipCode = feature.properties.ZCTA5CE10 || feature.properties.GEOID10;
    if (!deliveryZipSet.has(zipCode)) continue;
    
    const geometry = feature.geometry;
    if (geometry.type === 'Polygon') {
      for (const ring of geometry.coordinates) {
        if (isPointInPolygon([lon, lat], ring)) {
          return zipCode;
        }
      }
    } else if (geometry.type === 'MultiPolygon') {
      for (const polygon of geometry.coordinates) {
        for (const ring of polygon) {
          if (isPointInPolygon([lon, lat], ring)) {
            return zipCode;
          }
        }
      }
    }
  }
  
  return null;
}

function handleSearchClick() {
  const dropdown = document.getElementById('autocompleteDropdown');
  const isDropdownVisible = dropdown.style.display === 'block';
  
  // If only one autocomplete result, select it
  if (isDropdownVisible && autocompleteResults.length === 1) {
    selectAutocomplete(autocompleteResults[0].text);
  } else {
    searchLocation();
  }
}

window.handleSearchClick = handleSearchClick;

async function searchLocation() {
  const query = document.getElementById('searchInput').value.trim();
  const resultDiv = document.getElementById('searchResult');
  
  if (!query) {
    resultDiv.style.display = 'none';
    return;
  }
  
  // Show searching status
  resultDiv.className = 'search-result searching';
  resultDiv.style.display = 'block';
  resultDiv.textContent = 'Searching...';
  
  // Remove previous search marker
  if (searchMarker) {
    map.removeLayer(searchMarker);
    searchMarker = null;
  }
  
  try {
    // Check if it's ONLY a zip code (5 digits, nothing else)
    const zipMatch = query.match(/^\d{5}$/);
    if (zipMatch) {
      const zip = zipMatch[0];
      const isCovered = deliveryZipSet.has(zip);
      const hasDC = dcZipCodes.has(zip);
      
      if (isCovered) {
        // Find the zip in our data to get coordinates
        const zipData = DELIVERY_ZIPS.find(d => d.zip === zip);
        if (zipData) {
          // Geocode the zip to get center point
          const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${zip},USA&limit=1`);
          const data = await response.json();
          
          if (data && data.length > 0) {
            const lat = parseFloat(data[0].lat);
            const lon = parseFloat(data[0].lon);
            
            // Add search marker
            searchMarker = L.marker([lat, lon], {
              icon: L.divIcon({
                html: '<div class="search-marker">📍</div>',
                className: '',
                iconSize: [40, 40],
                iconAnchor: [20, 20]
              })
            }).addTo(map);
            
            // Zoom to location
            map.setView([lat, lon], 12, {animate: true});
            
            resultDiv.className = 'search-result covered';
            resultDiv.innerHTML = `✓ <strong>Zip ${zip} is covered!</strong><br>${zipData.city}, ${zipData.state}${hasDC ? ' <span style="color:#00A4FF;">📦 Has DC</span>' : ''}`;
          }
        }
      } else {
        resultDiv.className = 'search-result not-covered';
        resultDiv.innerHTML = `✗ <strong>Zip ${zip} is not covered</strong><br>Gopuff does not deliver to this zip code.`;
      }
      return;
    }
    
    // Otherwise, geocode the address/city/state
    const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1&countrycodes=us`);
    const data = await response.json();
    
    if (data && data.length > 0) {
      const lat = parseFloat(data[0].lat);
      const lon = parseFloat(data[0].lon);
      const displayName = data[0].display_name;
      
      // Extract zip from address if available
      const addressParts = data[0].address || {};
      const foundZip = addressParts.postcode;
      
      // Check coverage - first try exact zip match, then spatial check
      let isCovered = false;
      let hasDC = false;
      let coverageZip = foundZip;
      
      if (foundZip && deliveryZipSet.has(foundZip)) {
        isCovered = true;
        hasDC = dcZipCodes.has(foundZip);
        coverageZip = foundZip;
      } else {
        // Do spatial check - is the point inside any delivery zip polygon?
        const spatialZip = checkPointInDeliveryArea(lat, lon);
        if (spatialZip) {
          isCovered = true;
          hasDC = dcZipCodes.has(spatialZip);
          coverageZip = spatialZip;
        }
      }
      
      // Add search marker
      searchMarker = L.marker([lat, lon], {
        icon: L.divIcon({
          html: '<div class="search-marker">📍</div>',
          className: '',
          iconSize: [40, 40],
          iconAnchor: [20, 20]
        })
      }).addTo(map);
      
      // Zoom to location
      map.setView([lat, lon], 12, {animate: true});
      
      if (isCovered) {
        const zipData = DELIVERY_ZIPS.find(d => d.zip === coverageZip);
        resultDiv.className = 'search-result covered';
        resultDiv.innerHTML = `✓ <strong>This location is covered!</strong><br>${displayName}<br>Delivery zip: ${coverageZip}${hasDC ? ' <span style="color:#00A4FF;">📦 Has DC</span>' : ''}`;
      } else {
        resultDiv.className = 'search-result not-covered';
        resultDiv.innerHTML = `✗ <strong>This location is not covered</strong><br>${displayName}<br>Not in Gopuff delivery area.`;
      }
    } else {
      resultDiv.className = 'search-result not-covered';
      resultDiv.innerHTML = `✗ <strong>Location not found</strong><br>Please try a different search term.`;
    }
  } catch (error) {
    resultDiv.className = 'search-result not-covered';
    resultDiv.innerHTML = `✗ <strong>Search error</strong><br>Please try again.`;
    console.error('Search error:', error);
  }
}

window.searchLocation = searchLocation;

document.addEventListener('DOMContentLoaded', loadData);
</script>
